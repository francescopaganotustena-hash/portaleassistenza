services:
  - type: web
    name: portale-assistenza
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: "https://francescopaganotustena-hash.github.io"
    autoDeploy: true
